name: Build

on:
  push:
    branches: [main, boc_intranet]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to build (cn or global)'
        required: true
        default: 'cn'
        type: choice
        options:
          - cn
          - global

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Set version to current date
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          npm version $date --no-git-tag-version
          echo "BUILD_VERSION=$date" >> $env:GITHUB_ENV
          echo "Build version: $date"
        shell: pwsh

      - name: Add release notes for date version
        run: |
          $notesPath = "resources/update-notes.json"
          $notes = Get-Content $notesPath | ConvertFrom-Json
          $newVersion = @{
            version = $env:BUILD_VERSION
            date = Get-Date -Format "yyyy-MM-dd"
            highlights = @{
              "zh-CN" = @("CI Build - CI 自动构建版本")
              "en-US" = @("CI Build - Automated CI build")
            }
          }
          # Add new version at the beginning of versions array
          $notes.versions = @($newVersion) + $notes.versions
          $notes | ConvertTo-Json -Depth 10 | Set-Content $notesPath
          Write-Host "Added release notes for version: $env:BUILD_VERSION"
        shell: pwsh

      - name: Fix package-lock.json
        run: node scripts/patch-package-lock.js

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build Windows (CN)
        if: github.event.inputs.edition == 'cn' || github.event.inputs.edition == ''
        run: npm run build:win:cn

      - name: Build Windows (Global)
        if: github.event.inputs.edition == 'global'
        run: npm run build:win:global

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: Release ${{ env.BUILD_VERSION }}
          body: |
            Build date: ${{ env.BUILD_VERSION }}

            ## Artifacts
            - Windows installer (CN edition)
          files: |
            dist/cn/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
