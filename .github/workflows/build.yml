name: Build

on:
  push:
    branches: [main, boc_intranet]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to build (cn or global)'
        required: true
        default: 'cn'
        type: choice
        options:
          - cn
          - global

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Fix package-lock.json
        run: node scripts/patch-package-lock.js

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build Windows (CN)
        if: github.event.inputs.edition == 'cn' || github.event.inputs.edition == ''
        run: npm run build:win:cn

      - name: Build Windows (Global)
        if: github.event.inputs.edition == 'global'
        run: npm run build:win:global

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/
          retention-days: 7
