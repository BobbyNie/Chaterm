extends: electron-builder.yml

appId: ai.chaterm.global.app
productName: Chaterm

directories:
  output: dist/global

extraResources:
  - from: 'build/edition-config/'
    to: 'edition-config/'
    filter: '**/*.json'

publish:
  provider: generic
  url: https://static-download.chaterm.net/
  channel: latest

win:
  artifactName: ${name}-${version}-setup-${arch}.${ext}
  target:
    - target: portable
      arch:
        - x64
        - ia32
    - target: nsis
      arch:
        - x64
        - ia32
  protocols:
    - name: Chaterm
      schemes:
        - chaterm

nsis:
  artifactName: ${name}-${version}-setup-${arch}.${ext}
  guid: ai.chaterm.global.app
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  artifactName: ${name}-${version}-macos-${arch}.${ext}
  target:
    - target: zip
      arch:
        - x64
        - arm64
  protocols:
    - name: Chaterm
      schemes:
        - chaterm

linux:
  artifactName: ${name}-${version}-linux-${arch}.${ext}
  protocols:
    - name: Chaterm
      schemes:
        - chaterm
