extends: electron-builder.yml

appId: ai.chaterm.cn.app
productName: Chaterm CN

directories:
  output: dist/cn

extraResources:
  - from: 'build/edition-config/'
    to: 'edition-config/'
    filter: '**/*.json'

# publish: removed for the intranet edition (no external update server; CI publishes via GitHub Release).

win:
  executableName: Chaterm CN
  artifactName: ${name}-${version}-cn-setup-${arch}.${ext}
  target:
    - target: portable
      arch:
        - x64
        - ia32
    - target: nsis
      arch:
        - x64
        - ia32
  protocols:
    - name: Chaterm CN
      schemes:
        - chaterm-cn

nsis:
  artifactName: ${name}-${version}-cn-setup-${arch}.${ext}
  shortcutName: Chaterm CN
  uninstallDisplayName: Chaterm CN
  guid: ai.chaterm.cn.app
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  artifactName: ${name}-${version}-cn-macos-${arch}.${ext}
  target:
    - target: zip
      arch:
        - x64
        - arm64
  protocols:
    - name: Chaterm CN
      schemes:
        - chaterm-cn

linux:
  executableName: chaterm-cn
  artifactName: ${name}-${version}-cn-linux-${arch}.${ext}

deb:
  packageName: chaterm-cn
